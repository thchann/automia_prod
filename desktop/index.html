<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Automia</title>
    <meta name="description" content="Automia" />
    <meta name="author" content="Automia" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Automia" />
    <meta property="og:description" content="Automia" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/Otto_Logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@automia" />
    <meta name="twitter:image" content="/Otto_Logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/Otto_Logo.png" />

    <!-- Phones → mobile app at /m (unless user chose "View desktop site") -->
    <script>
      (function () {
        var path = location.pathname;
        if (path.startsWith("/m")) return;
        if (document.cookie.indexOf("automia_desktop=1") !== -1) return;
        if (path !== "/" && path !== "") return;

        function isMobileUa(ua) {
          return (
            /iPhone|iPod|iPad/i.test(ua) ||
            /Android.*Mobile|Android.*; wv\)/i.test(ua) ||
            /; wv\)/i.test(ua) ||
            /CriOS|FxiOS|EdgiOS/i.test(ua) ||
            /SamsungBrowser|Opera Mini|Opera Mobi|OPiOS|KaiOS|webOS|BlackBerry|IEMobile/i.test(
              ua,
            ) ||
            /Mobile Safari/i.test(ua)
          );
        }

        function isMobileDevice() {
          var ua = navigator.userAgent || "";
          var uaData = navigator.userAgentData;
          if (uaData && typeof uaData.mobile === "boolean") {
            if (uaData.mobile === true) return true;
            if (uaData.mobile === false) return false;
          }
          if (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1) {
            return true;
          }
          return isMobileUa(ua);
        }

        if (isMobileDevice()) {
          location.replace("/m" + location.search + location.hash);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
