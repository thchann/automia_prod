<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automia</title>
    <meta name="description" content="Automia" />
    <meta name="author" content="Automia" />

    <meta property="og:title" content="Automia" />
    <meta property="og:description" content="Automia" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/desktop/Otto_Logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@automia" />
    <meta name="twitter:image" content="/desktop/Otto_Logo.png" />
    <link rel="icon" type="image/png" href="/desktop/Otto_Logo.png" />
    <script>
      (function () {
        var path = location.pathname;
        if (path.startsWith("/desktop")) return;
        /** Already on mobile app URL — do not redirect away */
        if (path === "/m" || path.startsWith("/m/")) return;

        function isMobileUa(ua) {
          return (
            /iPhone|iPod|iPad/i.test(ua) ||
            /Android.*Mobile|Android.*; wv\)/i.test(ua) ||
            /; wv\)/i.test(ua) ||
            /CriOS|FxiOS|EdgiOS/i.test(ua) ||
            /SamsungBrowser|Opera Mini|Opera Mobi|OPiOS|KaiOS|webOS|BlackBerry|IEMobile/i.test(ua) ||
            /Mobile Safari/i.test(ua)
          );
        }

        function isMobileDevice() {
          var ua = navigator.userAgent || "";
          var uaData = navigator.userAgentData;
          if (uaData && typeof uaData.mobile === "boolean") {
            if (uaData.mobile === true) return true;
            if (uaData.mobile === false) return false;
          }
          if (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1) {
            return true;
          }
          return isMobileUa(ua);
        }

        var wantsDesktop = document.cookie.indexOf("automia_desktop=1") !== -1;
        if (wantsDesktop || !isMobileDevice()) {
          location.replace("/desktop" + location.search + location.hash);
          return;
        }
        /** Phone: canonical mobile URL is /m */
        if (isMobileDevice() && (path === "/" || path === "")) {
          location.replace("/m" + location.search + location.hash);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
